version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: secop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secop_pass_dev}
      POSTGRES_DB: ${POSTGRES_DB:-secop_monitor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secop_user} -d ${POSTGRES_DB:-secop_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - secop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secop_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-secop_user}:${POSTGRES_PASSWORD:-secop_pass_dev}@db:5432/${POSTGRES_DB:-secop_monitor}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-equipo@dtgrowthpartners.com}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-secop@dtgrowthpartners.com}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - secop_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secop_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - secop_network

  nginx:
    image: nginx:latest
    container_name: secop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - secop_network

volumes:
  pgdata:

networks:
  secop_network:
    driver: bridge
