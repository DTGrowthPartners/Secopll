version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: secop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: secop_user
      POSTGRES_PASSWORD: secop_pass_dev
      POSTGRES_DB: secop_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secop_user -d secop_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
